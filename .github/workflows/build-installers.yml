name: Build Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: false
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version || '1.0.0' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download .NET 8 prerequisites
        shell: pwsh
        run: |
          $meta = Invoke-RestMethod "https://dotnetcli.azureedge.net/dotnet/release-metadata/8.0/releases.json"
          $rel  = $meta.releases[0]
          # name field has no version (e.g. "dotnet-runtime-win-x64.exe"); versioned filename is in the URL
          $dotnet = $rel.runtime.files            | Where-Object { $_.name -eq 'dotnet-runtime-win-x64.exe' } | Select-Object -First 1
          $aspnet = $rel.'aspnetcore-runtime'.files | Where-Object { $_.name -eq 'aspnetcore-runtime-win-x64.exe' } | Select-Object -First 1
          New-Item -Force -ItemType Directory "ScreensView.Viewer\Prerequisites" | Out-Null
          $dotnetFile = $dotnet.url.Split('/')[-1]
          $aspnetFile = $aspnet.url.Split('/')[-1]
          Write-Host "Downloading $dotnetFile..."
          Invoke-WebRequest $dotnet.url -OutFile "ScreensView.Viewer\Prerequisites\$dotnetFile"
          Write-Host "Downloading $aspnetFile..."
          Invoke-WebRequest $aspnet.url -OutFile "ScreensView.Viewer\Prerequisites\$aspnetFile"

      - name: Build Viewer (+ agent payloads)
        run: dotnet build ScreensView.Viewer/ScreensView.Viewer.csproj -c Release

      - name: Build Viewer installer
        run: iscc /DAppVersion=${{ steps.version.outputs.version }} installer\ViewerSetup.iss

      - name: Build Agent installer
        run: iscc installer\AgentSetup.iss

      - name: Compute SHA-256 checksums
        shell: pwsh
        run: |
          $viewer = Get-ChildItem "installer/Output/ScreensView.Viewer-Setup-*.exe" | Select-Object -First 1
          $agent  = Get-Item "installer/Output/ScreensView.Agent-Setup.exe"
          $lines = @(
            "$(Get-FileHash $viewer.FullName -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $($viewer.Name)",
            "$(Get-FileHash $agent.FullName  -Algorithm SHA256 | Select-Object -ExpandProperty Hash)  $($agent.Name)"
          )
          $lines | Set-Content "installer/Output/checksums.sha256.txt"
          Write-Host "Checksums:"
          $lines

      - name: Upload Viewer installer
        uses: actions/upload-artifact@v4
        with:
          name: ScreensView.Viewer-Setup-${{ steps.version.outputs.version }}
          path: installer/Output/ScreensView.Viewer-Setup-*.exe

      - name: Upload Agent installer
        uses: actions/upload-artifact@v4
        with:
          name: ScreensView.Agent-Setup
          path: installer/Output/ScreensView.Agent-Setup.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/Output/ScreensView.Viewer-Setup-*.exe
            installer/Output/ScreensView.Agent-Setup.exe
            installer/Output/checksums.sha256.txt
